services:
  - type: web
    name: finanalyzer-backend
    env: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORTONE_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: finanalyzer-db
          property: connectionString

databases:
  - name: finanalyzer-db
    databaseName: finanalyzer
    user: finanalyzer
