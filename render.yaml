services:
  - type: web
    name: finanalyzer-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TOSS_SECRET_KEY
        sync: false          # Render 대시보드에서 직접 입력
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: finanalyzer-db
          property: connectionString

databases:
  - name: finanalyzer-db
    databaseName: finanalyzer
    user: finanalyzer
